<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sind wir ein Match?</title>
<meta name="description" content="Mach den Check – sind wir ein Match?">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =================================================================
     KONFIG – hier kannst du die wichtigsten Sachen schnell ändern.
     (Die Personen-Daten + Schwellen stehen weiter unten im <script>.)
     ================================================================= */
  :root{
    --bg:#FFF6F2;
    --bg2:#FFE9EC;
    --card:#FFFFFF;
    --ink:#2B1B22;
    --ink-soft:#7A6A70;
    --line:#F1E2DD;
    --accent:#FF5864;      /* Tinder-Coral */
    --accent2:#FF8A5B;     /* Tangerine     */
    --accent-ink:#FFFFFF;
    --good:#19C37D;
    --shadow:0 18px 50px -18px rgba(255,88,100,.45);
    --shadow-soft:0 10px 30px -12px rgba(43,27,34,.18);
    --grad:linear-gradient(135deg,var(--accent),var(--accent2));
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 80% -10%, var(--bg2) 0%, transparent 55%),
      radial-gradient(120% 90% at -10% 110%, #FFE3D6 0%, transparent 55%),
      var(--bg);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;
  }
  .wrap{
    width:100%;max-width:480px;min-height:100dvh;
    display:flex;flex-direction:column;
    padding:14px 18px 0;position:relative;
  }

  /* ---- Topbar ---- */
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0 4px}
  .brand{font-family:'Bricolage Grotesque';font-weight:800;font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:7px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--grad);box-shadow:0 0 0 4px rgba(255,88,100,.15)}
  .langs{display:flex;gap:5px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px}
  .langs button{
    border:0;background:transparent;cursor:pointer;font:inherit;font-weight:700;font-size:12px;
    color:var(--ink-soft);padding:5px 9px;border-radius:999px;transition:.18s;
  }
  .langs button.active{background:var(--grad);color:#fff;box-shadow:0 4px 12px -4px var(--accent)}

  /* ---- Screens ---- */
  .screen{flex:1;display:none;flex-direction:column;animation:fade .35s ease both}
  .screen.show{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .center{justify-content:center;text-align:center;gap:18px;padding-bottom:40px}

  .hero-emoji{font-size:64px;line-height:1;filter:drop-shadow(0 10px 18px rgba(255,88,100,.3));animation:pop .6s cubic-bezier(.2,1.4,.4,1) both}
  @keyframes pop{from{transform:scale(.3) rotate(-12deg);opacity:0}to{transform:none;opacity:1}}
  h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(30px,9vw,40px);line-height:1.02;letter-spacing:-.03em;margin:0}
  h1 .em{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{color:var(--ink-soft);font-size:15.5px;line-height:1.5;margin:0 auto;max-width:330px}
  .name-pill{display:inline-flex;align-items:center;gap:8px;font-weight:700;background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 16px;box-shadow:var(--shadow-soft);font-size:15px}
  .name-pill .av{width:22px;height:22px;border-radius:50%;background:var(--grad)}

  /* ---- Buttons ---- */
  .btn{
    border:0;cursor:pointer;font:inherit;font-weight:700;font-size:16.5px;
    padding:17px 22px;border-radius:18px;width:100%;
    background:var(--grad);color:#fff;box-shadow:var(--shadow);
    transition:transform .12s ease, box-shadow .2s ease;
    display:inline-flex;align-items:center;justify-content:center;gap:9px;
  }
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow-soft)}
  .btn.ig{background:linear-gradient(120deg,#F58529,#DD2A7B 45%,#8134AF 75%,#515BD4)}

  /* ---- Question screen ---- */
  .qhead{padding:8px 0 14px}
  .progress{height:9px;background:#fff;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;background:var(--grad);border-radius:999px;transition:width .4s cubic-bezier(.4,1,.4,1)}
  .counter{font-size:12.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.04em;margin-top:9px;text-transform:uppercase}

  .qcard{
    background:var(--card);border:1px solid var(--line);border-radius:26px;
    box-shadow:var(--shadow-soft);padding:22px 18px;margin-bottom:14px;
    flex:1;display:flex;flex-direction:column;
    animation:cardin .38s cubic-bezier(.2,1,.3,1) both;
  }
  @keyframes cardin{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
  .q{font-family:'Bricolage Grotesque';font-weight:700;font-size:22px;line-height:1.22;letter-spacing:-.02em;margin:4px 0 18px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{
    text-align:left;border:1.5px solid var(--line);background:#fff;border-radius:16px;
    padding:15px 16px;cursor:pointer;font:inherit;font-size:15.5px;font-weight:600;color:var(--ink);
    display:flex;align-items:center;gap:13px;transition:.16s;line-height:1.35;
  }
  .opt:active{transform:scale(.985)}
  .opt .key{
    flex:none;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
    font-weight:800;font-size:13px;background:var(--bg2);color:var(--accent);transition:.16s;
  }
  .opt.sel{border-color:transparent;background:var(--grad);color:#fff;box-shadow:var(--shadow)}
  .opt.sel .key{background:rgba(255,255,255,.25);color:#fff}

  /* ---- Result ---- */
  .score-ring{width:118px;height:118px;margin:0 auto;position:relative}
  .score-ring svg{transform:rotate(-90deg)}
  .score-ring .val{position:absolute;inset:0;display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:30px}
  .ig-row{font-size:13px;color:var(--ink-soft)}

  .foot{padding:16px 0 18px;text-align:center;font-size:11.5px;color:var(--ink-soft);opacity:.8;line-height:1.5}
  .foot b{color:var(--ink);font-weight:700}

  /* ---- Confetti ---- */
  #confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}
  .conf{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;will-change:transform,opacity;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(102vh) rotate(620deg);opacity:.9}}

  .stack{display:flex;flex-direction:column;gap:11px;width:100%}
  .multi-hint{font-size:12px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin:-8px 0 14px;display:flex;align-items:center;gap:6px}
  .multi-hint::before{content:"✓✓"}
  .btn.disabled{opacity:.4;pointer-events:none;box-shadow:none;filter:saturate(.4)}
  .ig-ico{flex:none}
  /* Processing / Spannungs-Loader */
  .loader{position:relative;width:124px;height:124px;margin:0 auto 6px}
  .loader-ring{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg,var(--accent),var(--accent2),#FFD166,var(--accent));
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 12px),#000 calc(100% - 11px));
            mask:radial-gradient(farthest-side,transparent calc(100% - 12px),#000 calc(100% - 11px));
    animation:spin 1.05s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-heart{position:absolute;inset:0;display:grid;place-items:center;font-size:40px;animation:beat 1.05s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}
  .proc-text{min-height:1.6em;font-family:'Bricolage Grotesque';font-weight:600;font-size:18px;color:var(--ink-soft);opacity:0;transform:translateY(6px);transition:opacity .45s ease,transform .45s ease;max-width:300px;margin:0 auto}
  .proc-text.in{opacity:1;transform:none}
</style>
</head>
<body>
<div id="confetti"></div>
<div class="wrap">

  <div class="top">
    <div class="brand"><span class="dot"></span><span data-i="brand">Sind wir ein Match?</span></div>
    <div class="langs" id="langs">
      <button data-lang="de">DE</button>
      <button data-lang="en">EN</button>
      <button data-lang="es">ES</button>
    </div>
  </div>

  <!-- START -->
  <section id="s-start" class="screen center show">
    <div class="hero-emoji">💘</div>
    <h1 data-i="startTitle"></h1>
    <p class="lead" data-i="startLead"></p>
    <div class="name-pill"><span class="av"></span><span id="start-name"></span></div>
    <div class="stack" style="margin-top:6px">
      <button class="btn" id="go" data-i="startBtn"></button>
    </div>
  </section>

  <!-- CHOOSER (falls kein/falscher ?p= Parameter) -->
  <section id="s-choose" class="screen center">
    <div class="hero-emoji">🎯</div>
    <h1 data-i="chooseTitle"></h1>
    <p class="lead" data-i="chooseLead"></p>
    <div class="stack" id="choose-list"></div>
  </section>

  <!-- QUESTIONS -->
  <section id="s-quiz" class="screen">
    <div class="qhead">
      <div class="progress"><i id="bar"></i></div>
      <div class="counter" id="counter"></div>
    </div>
    <div id="qmount"></div>
  </section>

  <!-- RESULT -->
  <section id="s-result" class="screen center"></section>

  <!-- PROCESSING (Spannungsaufbau zwischen letzter Frage und Ergebnis) -->
  <section id="s-processing" class="screen center">
    <div class="loader"><div class="loader-ring"></div><div class="loader-heart">💘</div></div>
    <p class="proc-text" id="proc-text"></p>
  </section>

  <!-- NO QR (Produktion, falls jemand ohne ?p= reinkommt) -->
  <section id="s-noqr" class="screen center">
    <div class="hero-emoji">📲</div>
    <h1 data-i="noqrTitle"></h1>
    <p class="lead" data-i="noqrLead"></p>
  </section>

  <div class="foot">
    <span data-i="madeBy"></span><br><b>MB Digital Solutions – Markic &amp; Bolz GbR</b>
  </div>
</div>

let lang = (localStorage.getItem('lang')) || (navigator.language||'de').slice(0,2);
if(!I18N[lang]) lang = 'de';

const params = new URLSearchParams(location.search);
const TEST = params.has('test');   // ?test=1 -> Personen-Auswahl + "Nochmal"-Button (nur fürs Testen)
const slug = ALIASES[(params.get('p')||'').toLowerCase()] || null;
const LOCK_KEY = 'qrush_done_' + (slug||'x');   // merkt sich, dass dieser Fragebogen schon ausgefüllt wurde
let person = slug ? PEOPLE[slug] : null;

let idx = 0;
let answers = [];

const $ = s => document.querySelector(s);
const T = () => I18N[lang];

function fill(text,obj){ return text.replace(/\{(\w+)\}/g,(_,k)=>obj[k]??''); }

function applyStatic(){
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i]').forEach(el=>{
    const key = el.getAttribute('data-i');
    if(T()[key]!==undefined) el.innerHTML = T()[key];
  });
  document.querySelectorAll('#langs button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===lang);
  });
  if(person){ $('#start-name').textContent = person.name; }
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));
  $(id).classList.add('show');
}

/* ---- Personen-Auswahl (Fallback ohne ?p=) ---- */
function buildChooser(){
  const list = $('#choose-list'); list.innerHTML='';
  Object.entries(PEOPLE).forEach(([key,p])=>{
    const b=document.createElement('button');
    b.className='btn ghost';
    b.textContent=p.name;
    b.onclick=()=>{ person=p; idx=0; answers=[]; applyStatic(); startQuiz(); };
    list.appendChild(b);
  });
}

/* ---- Quiz ---- */
let lastResult = null;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startQuiz(){
  idx=0; answers=[]; lastResult=null;
  // Antwortreihenfolge pro Frage einmalig mischen (bleibt stabil bei Sprachwechsel)
  person.q.forEach(q=>{ q._order = shuffle(q.o.map(o=>o[0])); });
  renderQuestion(); show('#s-quiz');
}

function optById(q,id){ return q.o.find(o=>o[0]===id); }

function renderQuestion(){
  const q = person.q[idx];
  const total = person.q.length;
  if(!q._order) q._order = shuffle(q.o.map(o=>o[0]));
  $('#bar').style.width = ((idx)/total*100)+'%';
  $('#counter').textContent = fill(T().counter,{a:idx+1,b:total});

  const sel = Array.isArray(answers[idx]) ? answers[idx] : (answers[idx]!=null?[answers[idx]]:[]);
  const opts = q._order.map((id,i)=>{
    const txt = optById(q,id)[1];
    const letter = String.fromCharCode(65+i);   // Anzeige-Buchstabe nach Position
    return `<button class="opt${sel.includes(id)?' sel':''}" data-id="${id}">
      <span class="key">${letter}</span>
      <span>${txt[lang]}</span>
    </button>`;
  }).join('');

  $('#qmount').innerHTML = `
    <div class="qcard" id="qcard">
      <div class="q">${q.t[lang]}</div>
      ${q.multi ? `<div class="multi-hint">${T().multiHint}</div>` : ``}
      <div class="opts">${opts}</div>
      ${q.multi ? `<div class="stack" style="margin-top:14px"><button class="btn ${sel.length?'':'disabled'}" id="nextBtn">${T().next}</button></div>` : ``}
    </div>`;

  $('#qmount').querySelectorAll('.opt').forEach(o=>{
    o.onclick = ()=> q.multi ? toggleMulti(o.dataset.id, o) : choose(o.dataset.id, o);
  });
  if(q.multi){ const nb=$('#nextBtn'); if(nb) nb.onclick=advance; }
}

/* Einfachauswahl: ein Klick -> direkt weiter */
function choose(id, el){
  el.parentElement.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  answers[idx] = id;
  const total = person.q.length;
  $('#bar').style.width = ((idx+1)/total*100)+'%';
  setTimeout(advance, 240);
}

/* Mehrfachauswahl: an-/abwählen, erst mit "Weiter" geht's weiter */
function toggleMulti(id, el){
  el.classList.toggle('sel');
  const chosen = [...$('#qmount').querySelectorAll('.opt.sel')].map(x=>x.dataset.id);
  answers[idx] = chosen;
  const nb=$('#nextBtn');
  if(nb) nb.classList.toggle('disabled', chosen.length===0);
}

function advance(){
  if(idx < person.q.length-1){ idx++; renderQuestion(); }
  else finish();
}

/* ---- Auswertung ---- */
function scoreHit(q,a){
  if(a==null) return false;
  const picked = Array.isArray(a) ? a : [a];
  return picked.some(id => q.correct.includes(id));   // mind. eine richtige zählt
}

function finish(){
  let hits=0;
  person.q.forEach((q,i)=>{ if(scoreHit(q, answers[i])) hits++; });
  const pct = Math.round(hits/person.q.length*100);
  const isMatch = (hits/person.q.length) >= person.threshold;
  lastResult = {isMatch, pct};
  if(!TEST && slug){ try{ localStorage.setItem(LOCK_KEY, JSON.stringify(lastResult)); }catch(e){} }
  showProcessing(()=>{ renderResult(isMatch, pct); show('#s-result'); });
}

/* Spannungsaufbau: 3–8 s, zufällige Reihenfolge einblendender Texte */
function showProcessing(done){
  $('#bar').style.width = '100%';
  show('#s-processing');
  const pool = shuffle([...T().procMsgs]);
  const total = 3000 + Math.random()*5000;           // 3–8 Sekunden
  const count = Math.min(pool.length, 3 + Math.floor(Math.random()*3)); // 3–5 Texte
  const step = total / count;
  const el = $('#proc-text');
  let i = 0;
  (function tick(){
    el.classList.remove('in'); void el.offsetWidth;
    el.textContent = pool[i % pool.length];
    el.classList.add('in');
    i++;
    if(i < count) setTimeout(tick, step);
    else setTimeout(()=>{ el.classList.remove('in'); done(); }, step);
  })();
}

      <h1>${T().matchTitle}</h1>
      ${ring}
      <p class="lead">${fill(T().matchLead,{name:person.name})}</p>
      <div class="stack" style="margin-top:4px">
        <a class="btn ig" href="${person.instagram}" target="_blank" rel="noopener">${IG_ICON} ${fill(T().igBtn,{name:person.name})}</a>
        <span class="ig-row">${fill(T().igHint,{name:person.name})}</span>
      </div>`;
    confetti();
  } else {
    const msg = T().noMsgs[Math.floor(Math.random()*T().noMsgs.length)];
    r.innerHTML = `
      <div class="hero-emoji">💔</div>
      <h1>${T().noTitle}</h1>
      ${ring}
      <p class="lead">${msg}</p>
      <p class="ig-row">${fill(T().yourMatch,{p:pct})}</p>
      ${TEST ? `<div class="stack" style="margin-top:4px">
        <button class="btn ghost" id="retry">${T().retry}</button>
      </div>` : ``}`;
    const rt = $('#retry'); if(rt) rt.onclick = startQuiz;
  }
}

/* ---- Confetti (ohne Library) ---- */
function confetti(){
  const box=$('#confetti'); const colors=['#FF5864','#FF8A5B','#FFD166','#19C37D','#5B8DEF','#C45BEF'];
  for(let i=0;i<90;i++){
    const c=document.createElement('div'); c.className='conf';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2.4+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*.5)+'s';
    c.style.transform=`translateY(0) rotate(${Math.random()*360}deg)`;
    if(Math.random()>.6) c.style.borderRadius='50%';
    box.appendChild(c);
  }
  setTimeout(()=>{box.innerHTML='';}, 4800);
}

/* ---- Sprache wechseln ---- */
document.querySelectorAll('#langs button').forEach(b=>{
  b.onclick=()=>{
    lang=b.dataset.lang; localStorage.setItem('lang',lang);
    applyStatic();
    // aktuellen Screen neu rendern
    if($('#s-quiz').classList.contains('show')) renderQuestion();
    else if($('#s-result').classList.contains('show')){ if(lastResult) renderResult(lastResult.isMatch,lastResult.pct); }
    else if($('#s-choose').classList.contains('show')) buildChooser();
  };
});

/* ---- Init ---- */
applyStatic();
if(person){
  // Reload-Schutz: wurde der Fragebogen schon ausgefüllt, direkt Ergebnis zeigen (nicht im Testmodus)
  let saved = null;
  if(!TEST){ try{ saved = JSON.parse(localStorage.getItem(LOCK_KEY)); }catch(e){} }
  if(saved && typeof saved.pct==='number'){
    lastResult = saved;
    renderResult(saved.isMatch, saved.pct);
    show('#s-result');
  }else{
    $('#go').onclick = startQuiz;
    show('#s-start');
  }
}else if(TEST){
  buildChooser();
  show('#s-choose');
}else{
  show('#s-noqr');
}
</script>
